<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SVG favicon - Best for modern browsers (crisp at any size) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- Fallback PNG for older browsers (Safari/iOS sometimes prefers PNG) -->
    <link rel="alternate icon" type="image/png" href="/favicon.png" />
    
    <!-- Shortcut icon fallback -->
    <link rel="shortcut icon" href="/favicon.svg" type="image/svg+xml" />
    
    <!-- Apple Touch Icon for iOS (will use SVG converted by browser) -->
    <link rel="apple-touch-icon" href="/favicon.svg" />
    
    <!-- Theme color for browser UI (matches TerraFit green) -->
    <meta name="theme-color" content="#74A14D" />
    
    <!-- Optional: Better Microsoft tile support -->
    <meta name="msapplication-TileImage" content="/favicon.svg" />
    <meta name="msapplication-TileColor" content="#74A14D" />
    
    <title>TerraFit | Outdoor Fitness & Adventure Infrastructure</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
